<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="es">
<title>Gooligoog</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="css/home.css">
</head>
<body>
<header class="site-header">
<div class="site-header-inner">
<a class="brand" href="./">
<img src="logo.png" alt="">
<span>Gooligoog</span>
</a>
<nav aria-label="Navegación principal">
<a href="#library">Viajes</a>
<a href="iceland2026/">Iceland 2026</a>
</nav>
</div>
</header>

<main class="home-shell">
<section class="home-hero">

 
<p class="magic-copy">Un lugar para guardar roadbooks, mapas, reservas y esos detalles que salvan un viaje cuando ya estás en movimiento.</p>

</section>

<section class="library-panel" id="library" aria-label="Biblioteca de viajes">
<div class="library-top">
<div>
<p class="section-kicker">Viajes guardados</p>
<h2>Todos los viajes</h2>
</div>
<span class="trip-count" id="tripCount">0 viajes</span>
</div>

<div class="library-tools">
<label class="search-box">
<span>Buscar</span>
<input id="tripSearch" type="search" placeholder="Islandia, Italia, roadtrip...">
</label>
<div class="filter-row" aria-label="Filtros de viajes">
<button class="filter-button active" type="button" data-filter="all">Todos</button>
<button class="filter-button" type="button" data-filter="dreaming">Soñándolo</button>
<button class="filter-button" type="button" data-filter="planned">Planificando</button>
<button class="filter-button" type="button" data-filter="current">Viviéndolo</button>
<button class="filter-button" type="button" data-filter="finished">Finalizados</button>
</div>
</div>

<section class="trip-grid" id="tripGrid" aria-label="Lista de viajes"></section>
<p class="empty-state" id="emptyState" hidden>No encontré viajes con ese filtro.</p>
</section>
</main>
<footer class="site-footer">
<span>Gooligoog</span>
<p>Del sueño al mapa. Del mapa a la memoria.</p>
</footer>
<script src="js/home.js"></script>
</body>
</html>
